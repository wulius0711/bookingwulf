name: Daily DB Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 18
        run: |
          sudo apt-get install -y curl gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client-18

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_RAILWAY }}
        run: |
          set -eo pipefail
          if [ -z "$DATABASE_URL" ]; then echo "ERROR: DATABASE_URL_RAILWAY secret not set"; exit 1; fi
          pg_dump "$DATABASE_URL" --no-owner --no-acl | gzip > backup-$(date +%Y-%m-%d).sql.gz
          SIZE=$(stat -c%s backup-$(date +%Y-%m-%d).sql.gz)
          if [ "$SIZE" -lt 1000 ]; then echo "ERROR: Backup file suspiciously small ($SIZE bytes)"; exit 1; fi
          echo "Backup OK: $SIZE bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*.sql.gz
          retention-days: 30
