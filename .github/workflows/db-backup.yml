name: Daily DB Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump
        run: sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_RAILWAY }}
        run: pg_dump "$DATABASE_URL" --no-owner --no-acl | gzip > backup-$(date +%Y-%m-%d).sql.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*.sql.gz
          retention-days: 30
