<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verfügbarkeits-Kalender</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --aw-text: #111;
        --aw-muted: #5f5f5f;
        --aw-border: #e5e7eb;
        --aw-hover: #f3f4f6;
        --aw-free: #C0DD97;
        --aw-booked: #F5C4B3;
        --aw-blocked: #D1D5DB;
        --aw-past: #ECEAE3;
        --aw-today: #378ADD;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: transparent;
        font-size: 13px;
      }

      .aw-wrap {
        background: transparent;
        padding: 4px 0 12px;
        color: var(--aw-text);
      }

      /* Header */
      .aw-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .aw-nav {
        background: #fff;
        border: 1px solid var(--aw-border);
        border-radius: 8px;
        width: 34px;
        height: 34px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--aw-text);
        flex-shrink: 0;
        transition: background 0.1s;
      }
      .aw-nav:hover:not(:disabled) { background: var(--aw-hover); }
      .aw-nav:disabled { color: var(--aw-border); cursor: default; }

      .aw-month-label {
        font-size: 15px;
        font-weight: 700;
        color: var(--aw-text);
        min-width: 110px;
        text-align: center;
        letter-spacing: -0.01em;
      }
      .aw-spacer { flex: 1; }

      /* Legend */
      .aw-legend {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .aw-legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--aw-muted);
      }
      .aw-dot {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      /* Grid */
      .aw-grid {
        display: flex;
        align-items: flex-start;
      }
      .aw-labels {
        width: 120px;
        flex-shrink: 0;
        padding-right: 12px;
      }
      .aw-label-spacer { height: 24px; }
      .aw-apt-label {
        height: 26px;
        display: flex;
        align-items: center;
        font-size: 13px;
        color: var(--aw-text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-bottom: 4px;
      }
      .aw-apt-label:last-child { margin-bottom: 0; }

      .aw-days-col {
        flex: 1;
        min-width: 0;
      }
      .aw-day-numbers {
        display: flex;
        gap: 2px;
        margin-bottom: 6px;
        height: 18px;
      }
      .aw-day-num {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--aw-muted);
      }
      .aw-day-num.is-today { color: var(--aw-today); font-weight: 700; }

      .aw-row {
        display: flex;
        gap: 2px;
        margin-bottom: 4px;
      }
      .aw-row:last-child { margin-bottom: 0; }

      .aw-cell {
        flex: 1;
        min-width: 0;
        height: 26px;
        border-radius: 4px;
        cursor: default;
        transition: opacity 0.1s;
      }
      .aw-cell.run-start  { border-radius: 4px 0 0 4px; }
      .aw-cell.run-middle { border-radius: 0; }
      .aw-cell.run-end    { border-radius: 0 4px 4px 0; }
      .aw-cell.booked.run-start,  .aw-cell.booked.run-middle  { box-shadow: 2px 0 0 0 var(--aw-booked); }
      .aw-cell.blocked.run-start, .aw-cell.blocked.run-middle { box-shadow: 2px 0 0 0 var(--aw-blocked); }
      .aw-cell.free    { background: var(--aw-free); }
      .aw-cell.booked  { background: var(--aw-booked); }
      .aw-cell.blocked { background: var(--aw-blocked); }
      .aw-cell.past    { background: var(--aw-past); }
      .aw-cell.is-today { box-shadow: 0 0 0 1.5px var(--aw-today); }
      .aw-cell.clickable { cursor: pointer; }
      .aw-cell.clickable:hover { opacity: 0.8; }

      .aw-state {
        text-align: center;
        padding: 32px 16px;
        color: var(--aw-muted);
        font-size: 13px;
      }
      .aw-state.error { color: #dc2626; }
    </style>
  </head>
  <body>
    <div id="awRoot"><div class="aw-wrap"><p class="aw-state" id="awLoading">Lädt…</p></div></div>

    <script>
      (function () {
        var qp = new URLSearchParams(location.search);
        var hotel  = qp.get('hotel')  || '';
        var lang   = ['de','en','it'].includes(qp.get('lang')) ? qp.get('lang') : 'de';
        var target = qp.get('target') || '';
        var months = parseInt(qp.get('months') || '6', 10) || 6;
        var base   = location.origin;

        var SHOW_DAYS = new Set([1, 5, 10, 15, 20, 25]);

        var T = {
          de: { months: ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'], free: 'Frei', booked: 'Belegt', blocked: 'Blockiert', loading: 'Lädt…', error: 'Fehler beim Laden.', empty: 'Keine Apartments verfügbar.', prev: 'Vorheriger Monat', next: 'Nächster Monat' },
          en: { months: ['January','February','March','April','May','June','July','August','September','October','November','December'], free: 'Available', booked: 'Booked', blocked: 'Blocked', loading: 'Loading…', error: 'Error loading data.', empty: 'No apartments available.', prev: 'Previous month', next: 'Next month' },
          it: { months: ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'], free: 'Libero', booked: 'Occupato', blocked: 'Bloccato', loading: 'Caricamento…', error: 'Errore durante il caricamento.', empty: 'Nessun appartamento disponibile.', prev: 'Mese precedente', next: 'Mese successivo' },
        };
        var t = T[lang] || T.de;

        var apartments = [];
        var fromIso = '';
        var toIso   = '';
        var now = new Date();
        var curYear  = now.getFullYear();
        var curMonth = now.getMonth();

        function pad(n) { return String(n).padStart(2, '0'); }
        function isoStr(y, m1, d) { return y + '-' + pad(m1) + '-' + pad(d); }
        function todayIso() { return isoStr(now.getFullYear(), now.getMonth() + 1, now.getDate()); }

        function dayStatus(dateStr, ranges) {
          for (var i = 0; i < ranges.length; i++) {
            var r = ranges[i];
            if (dateStr >= r.start && dateStr < r.end) return r.type;
          }
          return 'free';
        }

        function showDayLabel(d, daysInMo) {
          return SHOW_DAYS.has(d) || d === daysInMo;
        }

        function render() {
          var today     = todayIso();
          var daysInMo  = new Date(curYear, curMonth + 1, 0).getDate();
          var isCurrentMonth = curYear === now.getFullYear() && curMonth === now.getMonth();

          var fromParts = fromIso.split('-');
          var fromY = +fromParts[0], fromM = +fromParts[1] - 1;
          var toParts = toIso.split('-');
          var toY = +toParts[0], toM = +toParts[1] - 1;

          var canPrev = !(curYear === fromY && curMonth === fromM);
          var nextY = curMonth === 11 ? curYear + 1 : curYear;
          var nextM = curMonth === 11 ? 0 : curMonth + 1;
          var canNext = nextY < toY || (nextY === toY && nextM < toM);

          var svgPrev = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          var svgNext = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12l4-4-4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

          var html = '<div class="aw-wrap">';

          // Header
          html += '<div class="aw-header">';
          html += '<button class="aw-nav" id="awPrev" aria-label="' + t.prev + '"' + (canPrev ? '' : ' disabled') + '>' + svgPrev + '</button>';
          html += '<span class="aw-month-label">' + t.months[curMonth] + ' ' + curYear + '</span>';
          html += '<button class="aw-nav" id="awNext" aria-label="' + t.next + '"' + (canNext ? '' : ' disabled') + '>' + svgNext + '</button>';
          html += '<div class="aw-spacer"></div>';
          html += '<div class="aw-legend">';
          html += '<span class="aw-legend-item"><span class="aw-dot" style="background:var(--aw-free)"></span>' + t.free + '</span>';
          html += '<span class="aw-legend-item"><span class="aw-dot" style="background:var(--aw-booked)"></span>' + t.booked + '</span>';
          html += '<span class="aw-legend-item"><span class="aw-dot" style="background:var(--aw-blocked)"></span>' + t.blocked + '</span>';
          html += '</div></div>';

          if (apartments.length === 0) {
            html += '<p class="aw-state">' + t.empty + '</p>';
          } else {
            html += '<div class="aw-grid">';

            // Labels column
            html += '<div class="aw-labels"><div class="aw-label-spacer"></div>';
            for (var a = 0; a < apartments.length; a++) {
              html += '<div class="aw-apt-label" title="' + apartments[a].name + '">' + apartments[a].name + '</div>';
            }
            html += '</div>';

            // Days column
            html += '<div class="aw-days-col">';

            // Day number row
            html += '<div class="aw-day-numbers">';
            for (var d = 1; d <= daysInMo; d++) {
              var ds = isoStr(curYear, curMonth + 1, d);
              var isTodayD = isCurrentMonth && ds === today;
              var label = (showDayLabel(d, daysInMo) || isTodayD) ? d : '';
              html += '<div class="aw-day-num' + (isTodayD ? ' is-today' : '') + '">' + label + '</div>';
            }
            html += '</div>';

            // Apartment rows
            for (var ai = 0; ai < apartments.length; ai++) {
              var apt = apartments[ai];

              // Pre-calculate status for each day
              var statuses = [];
              for (var dd = 1; dd <= daysInMo; dd++) {
                var ds2 = isoStr(curYear, curMonth + 1, dd);
                var isPastDay = isCurrentMonth && ds2 < today;
                statuses.push(isPastDay ? 'past' : dayStatus(ds2, apt.ranges));
              }

              html += '<div class="aw-row">';
              for (var dd = 1; dd <= daysInMo; dd++) {
                var ds2 = isoStr(curYear, curMonth + 1, dd);
                var isTodayCell = isCurrentMonth && ds2 === today;
                var status = statuses[dd - 1];
                var isBlock = status === 'booked' || status === 'blocked';
                var prevSame = isBlock && dd > 1 && statuses[dd - 2] === status;
                var nextSame = isBlock && dd < daysInMo && statuses[dd] === status;
                var runCls = isBlock ? (prevSame && nextSame ? ' run-middle' : prevSame ? ' run-end' : nextSame ? ' run-start' : '') : '';
                var canClick = status === 'free' && !isTodayCell && target && !(isCurrentMonth && ds2 < today);
                var cls = 'aw-cell ' + status + runCls + (isTodayCell ? ' is-today' : '') + (canClick ? ' clickable' : '');
                var dataDate = canClick ? ' data-date="' + ds2 + '"' : '';
                html += '<div class="' + cls + '"' + dataDate + '></div>';
              }
              html += '</div>';
            }

            html += '</div></div>';
          }

          html += '</div>';
          document.getElementById('awRoot').innerHTML = html;

          document.getElementById('awPrev').addEventListener('click', function () {
            if (curMonth === 0) { curMonth = 11; curYear--; } else curMonth--;
            render();
          });
          document.getElementById('awNext').addEventListener('click', function () {
            if (curMonth === 11) { curMonth = 0; curYear++; } else curMonth++;
            render();
          });

          if (target) {
            document.querySelectorAll('.aw-cell.clickable').forEach(function (cell) {
              cell.addEventListener('click', function () {
                var date = this.getAttribute('data-date');
                if (!date) return;
                var url = new URL(target);
                url.searchParams.set('arrival', date);
                try { localStorage.setItem('bw_pending_arrival', JSON.stringify({ arrival: date, exp: Date.now() + 10 * 60 * 1000 })); } catch (_e) {}
                window.parent.postMessage({ type: 'aw-navigate', href: url.toString() }, '*');
                try { window.top.location.href = url.toString(); } catch (_e) {}
              });
            });
          }

          sendHeight();
        }

        function sendHeight() {
          requestAnimationFrame(function () {
            window.parent.postMessage({ type: 'aw-height', height: document.documentElement.scrollHeight }, '*');
          });
        }

        fetch(base + '/api/availability-widget?hotel=' + encodeURIComponent(hotel) + '&months=' + months)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (!data.success) throw new Error(data.message || 'Error');
            apartments = data.apartments || [];
            fromIso = data.from;
            toIso   = data.to;
            render();
          })
          .catch(function () {
            document.getElementById('awRoot').innerHTML = '<div class="aw-wrap"><p class="aw-state error">' + t.error + '</p></div>';
            sendHeight();
          });
      })();
    </script>
  </body>
</html>
