<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Mini Widget</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --accent: #111111;
        --bg: #ffffff;
        --card-bg: #ffffff;
        --input-bg: #f9fafb;
        --text: #111111;
        --muted: #6b7280;
        --line: #e5e7eb;
        --radius: 8px;
        --button-radius: 8px;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      body {
        background: transparent;
        padding: 0;
      }

      .mini-widget {
        background: var(--card-bg);
        border: 1.5px solid var(--line);
        border-radius: calc(var(--radius) + 8px);
        padding: 20px;
        display: grid;
        gap: 14px;
      }

      .mini-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.02em;
      }

      .mini-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .mini-field {
        position: relative;
        flex: 1 1 140px;
        min-width: 120px;
      }

      .mini-field input[type="date"] {
        width: 100%;
        padding: 10px 36px 10px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        font-size: 14px;
        color: var(--text);
        background: var(--input-bg);
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        cursor: pointer;
        font-family: inherit;
      }

      .mini-field input[type="date"]:focus {
        border-color: var(--accent);
      }

      .mini-field input[type="date"]::-webkit-calendar-picker-indicator {
        opacity: 0.4;
        cursor: pointer;
      }

      .mini-field .field-label {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        color: var(--muted);
        pointer-events: none;
        transition: opacity 0.15s;
      }

      .mini-field input[type="date"]:not(:placeholder-shown) + .field-label,
      .mini-field input[type="date"]:focus + .field-label,
      .mini-field input[type="date"].has-value + .field-label {
        opacity: 0;
      }

      /* Adults counter */
      .mini-adults {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        background: var(--input-bg);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 6px 10px;
        height: 40px;
      }

      .adults-btn {
        width: 24px;
        height: 24px;
        border: none;
        border-radius: 50%;
        background: var(--line);
        color: var(--text);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
        transition: background 0.15s;
        padding: 0;
      }

      .adults-btn:hover:not(:disabled) { background: #d1d5db; }
      .adults-btn:disabled { opacity: 0.4; cursor: default; }

      .adults-count {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        min-width: 16px;
        text-align: center;
      }

      .adults-label {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
      }

      /* Availability status */
      .mini-avail {
        font-size: 13px;
        display: none;
        align-items: center;
        gap: 6px;
      }

      .mini-avail.visible { display: flex; }

      .avail-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .avail-dot.checking {
        background: #9ca3af;
        animation: pulse 1s ease-in-out infinite;
      }

      .avail-dot.available { background: #16a34a; }
      .avail-dot.unavailable { background: #dc2626; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .avail-text { color: var(--muted); }
      .avail-text.available { color: #16a34a; font-weight: 500; }
      .avail-text.unavailable { color: #dc2626; font-weight: 500; }

      .mini-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mini-btn {
        flex: 1 1 100px;
        padding: 10px 18px;
        border: none;
        border-radius: var(--button-radius);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        font-family: inherit;
        transition: opacity 0.15s;
        white-space: nowrap;
      }

      .mini-btn:hover { opacity: 0.85; }
      .mini-btn:disabled { opacity: 0.5; cursor: default; }

      .mini-btn.secondary {
        background: transparent;
        color: var(--accent);
        border: 1.5px solid var(--accent);
      }

      .mini-error {
        font-size: 13px;
        color: #dc2626;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="mini-widget">
      <div class="mini-title" id="miniTitle">Anfragen &amp; Buchen</div>
      <div class="mini-row">
        <div class="mini-field">
          <input type="date" id="miniArrival" placeholder=" " />
          <label for="miniArrival" class="field-label" id="miniArrivalLabel">Anreise</label>
        </div>
        <div class="mini-field">
          <input type="date" id="miniDeparture" placeholder=" " />
          <label for="miniDeparture" class="field-label" id="miniDepartureLabel">Abreise</label>
        </div>
        <div class="mini-adults" id="miniAdults" role="group" aria-label="Erwachsene">
          <button class="adults-btn" id="adultsDown" aria-label="Weniger Erwachsene" disabled>−</button>
          <span class="adults-count" id="adultsCount" aria-live="polite">2</span>
          <span class="adults-label" id="adultsLabel">Erw.</span>
          <button class="adults-btn" id="adultsUp" aria-label="Mehr Erwachsene">+</button>
        </div>
      </div>
      <div class="mini-avail" id="miniAvail" role="status" aria-live="polite">
        <span class="avail-dot" id="availDot"></span>
        <span class="avail-text" id="availText"></span>
      </div>
      <div class="mini-actions" id="miniActions">
        <!-- buttons rendered by JS based on settings -->
      </div>
      <div class="mini-error" id="miniError" role="alert" aria-live="assertive">Bitte Anreise und Abreise auswählen.</div>
    </div>

    <script>
      (() => {
        const API_BASE = '';
        const qp = new URLSearchParams(window.location.search);
        const HOTEL_SLUG = qp.get('hotel') || 'default';
        const WIDGET_CONFIG = qp.get('config') || '';
        let BOOKING_PAGE = qp.get('target') || '';
        const LANG = qp.get('lang') === 'en' ? 'en' : 'de';

        const T = {
          de: {
            arrival: 'Anreise', departure: 'Abreise', adults: 'Erw.',
            request: 'Anfrage', book: 'Buchen',
            error: 'Bitte Anreise und Abreise auswählen.',
            titleDefault: 'Anfragen & Buchen', titleBook: 'Jetzt buchen', titleRequest: 'Jetzt anfragen',
            availChecking: 'Verfügbarkeit prüfen …',
            availYes: 'Verfügbar',
            availNo: 'Nicht verfügbar',
            adultsDown: 'Weniger Erwachsene', adultsUp: 'Mehr Erwachsene',
            adultsGroup: 'Erwachsene',
          },
          en: {
            arrival: 'Arrival', departure: 'Departure', adults: 'Adults',
            request: 'Enquire', book: 'Book',
            error: 'Please select arrival and departure.',
            titleDefault: 'Enquire & Book', titleBook: 'Book now', titleRequest: 'Enquire now',
            availChecking: 'Checking availability …',
            availYes: 'Available',
            availNo: 'Not available',
            adultsDown: 'Fewer adults', adultsUp: 'More adults',
            adultsGroup: 'Adults',
          },
        }[LANG];

        let accentColor = null;
        let bgColor = null;
        let buttonRadius = null;
        let cardRadius = null;
        let enableInstantBooking = false;
        let hideRequestOption = false;

        let adults = 2;
        let availTimer = null;

        const arrivalEl = document.getElementById('miniArrival');
        const departureEl = document.getElementById('miniDeparture');
        const actionsEl = document.getElementById('miniActions');
        const errorEl = document.getElementById('miniError');
        const titleEl = document.getElementById('miniTitle');
        const adultsCountEl = document.getElementById('adultsCount');
        const adultsDownEl = document.getElementById('adultsDown');
        const adultsUpEl = document.getElementById('adultsUp');
        const adultsLabelEl = document.getElementById('adultsLabel');
        const adultsGroupEl = document.getElementById('miniAdults');
        const availEl = document.getElementById('miniAvail');
        const availDotEl = document.getElementById('availDot');
        const availTextEl = document.getElementById('availText');

        // Apply language
        document.getElementById('miniArrivalLabel').textContent = T.arrival;
        document.getElementById('miniDepartureLabel').textContent = T.departure;
        adultsLabelEl.textContent = T.adults;
        adultsGroupEl.setAttribute('aria-label', T.adultsGroup);
        adultsDownEl.setAttribute('aria-label', T.adultsDown);
        adultsUpEl.setAttribute('aria-label', T.adultsUp);
        errorEl.textContent = T.error;
        titleEl.textContent = T.titleDefault;

        // Today as min date
        const todayStr = new Date().toISOString().slice(0, 10);
        arrivalEl.min = todayStr;
        departureEl.min = todayStr;

        function updateAdultsUI() {
          adultsCountEl.textContent = adults;
          adultsDownEl.disabled = adults <= 1;
        }

        adultsDownEl.addEventListener('click', () => {
          if (adults > 1) { adults--; updateAdultsUI(); triggerAvailCheck(); }
        });

        adultsUpEl.addEventListener('click', () => {
          adults++;
          updateAdultsUI();
          triggerAvailCheck();
        });

        function setAvailStatus(state) {
          // state: 'hidden' | 'checking' | 'available' | 'unavailable'
          availEl.classList.toggle('visible', state !== 'hidden');
          availDotEl.className = 'avail-dot ' + (state === 'hidden' ? '' : state);
          availTextEl.className = 'avail-text ' + (state === 'hidden' ? '' : state);
          if (state === 'checking') availTextEl.textContent = T.availChecking;
          else if (state === 'available') availTextEl.textContent = T.availYes;
          else if (state === 'unavailable') availTextEl.textContent = T.availNo;
          else availTextEl.textContent = '';
        }

        async function checkAvailability() {
          if (!arrivalEl.value || !departureEl.value) { setAvailStatus('hidden'); return; }
          setAvailStatus('checking');
          try {
            const res = await fetch(
              `${API_BASE}/api/availability-quick?hotel=${encodeURIComponent(HOTEL_SLUG)}&arrival=${arrivalEl.value}&departure=${departureEl.value}`
            );
            if (!res.ok) { setAvailStatus('hidden'); return; }
            const data = await res.json();
            if (!data.success) { setAvailStatus('hidden'); return; }
            setAvailStatus(data.available ? 'available' : 'unavailable');
          } catch {
            setAvailStatus('hidden');
          }
        }

        function triggerAvailCheck() {
          if (!arrivalEl.value || !departureEl.value) { setAvailStatus('hidden'); return; }
          clearTimeout(availTimer);
          availTimer = setTimeout(checkAvailability, 400);
        }

        arrivalEl.addEventListener('change', () => {
          arrivalEl.classList.toggle('has-value', !!arrivalEl.value);
          if (arrivalEl.value) {
            const next = new Date(arrivalEl.value);
            next.setDate(next.getDate() + 1);
            departureEl.min = next.toISOString().slice(0, 10);
            if (departureEl.value && departureEl.value <= arrivalEl.value) {
              next.setDate(next.getDate() + 1);
              departureEl.value = next.toISOString().slice(0, 10);
              departureEl.classList.add('has-value');
            }
          }
          errorEl.style.display = 'none';
          triggerAvailCheck();
        });

        departureEl.addEventListener('change', () => {
          departureEl.classList.toggle('has-value', !!departureEl.value);
          errorEl.style.display = 'none';
          triggerAvailCheck();
        });

        function navigate(type) {
          if (!arrivalEl.value || !departureEl.value) {
            errorEl.style.display = 'block';
            return;
          }
          try {
            localStorage.setItem('bw_mini_booking', JSON.stringify({
              arrival: arrivalEl.value, departure: departureEl.value, adults: adults, type: type,
              exp: Date.now() + 10 * 60 * 1000,
            }));
          } catch(e) {}
          const url = new URL(BOOKING_PAGE || (API_BASE + '/widget.html'), window.location.href);
          url.searchParams.set('hotel', HOTEL_SLUG);
          if (WIDGET_CONFIG) url.searchParams.set('config', WIDGET_CONFIG);
          if (LANG === 'en') url.searchParams.set('lang', 'en');
          url.searchParams.set('arrival', arrivalEl.value);
          url.searchParams.set('departure', departureEl.value);
          url.searchParams.set('adults', String(adults));
          url.searchParams.set('type', type);
          const a = document.createElement('a');
          a.href = url.toString();
          a.target = '_top';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }

        function renderButtons() {
          actionsEl.innerHTML = '';
          if (!hideRequestOption) {
            const reqBtn = document.createElement('button');
            reqBtn.className = 'mini-btn' + (enableInstantBooking ? ' secondary' : '');
            reqBtn.textContent = T.request;
            reqBtn.addEventListener('click', () => navigate('request'));
            actionsEl.appendChild(reqBtn);
          }
          if (enableInstantBooking) {
            const bookBtn = document.createElement('button');
            bookBtn.className = 'mini-btn';
            bookBtn.textContent = T.book;
            bookBtn.addEventListener('click', () => navigate('booking'));
            actionsEl.appendChild(bookBtn);
          }
          if (!enableInstantBooking && hideRequestOption) {
            const reqBtn = document.createElement('button');
            reqBtn.className = 'mini-btn';
            reqBtn.textContent = T.request;
            reqBtn.addEventListener('click', () => navigate('request'));
            actionsEl.appendChild(reqBtn);
          }
        }

        async function loadSettings() {
          try {
            const res = await fetch(
              `${API_BASE}/api/hotel-settings?hotel=${HOTEL_SLUG}${WIDGET_CONFIG ? `&config=${encodeURIComponent(WIDGET_CONFIG)}` : ''}`
            );
            if (!res.ok) return;
            const data = await res.json();
            const s = data.settings || {};

            enableInstantBooking = s.enableInstantBooking === true;
            hideRequestOption = s.hideRequestOption === true;

            if (!BOOKING_PAGE && data.miniWidgetTarget) {
              BOOKING_PAGE = data.miniWidgetTarget;
            }

            if (s.accentColor) accentColor = s.accentColor;
            if (s.backgroundColor) bgColor = s.backgroundColor;
            if (s.buttonRadius != null) buttonRadius = s.buttonRadius;
            if (s.cardRadius != null) cardRadius = s.cardRadius;

            const root = document.documentElement;
            if (accentColor) root.style.setProperty('--accent', accentColor);
            if (bgColor) root.style.setProperty('--bg', bgColor);
            if (buttonRadius != null) root.style.setProperty('--button-radius', buttonRadius + 'px');
            if (cardRadius != null) root.style.setProperty('--radius', cardRadius + 'px');
            if (s.cardBackground) {
              root.style.setProperty('--card-bg', s.cardBackground);
              root.style.setProperty('--input-bg', `color-mix(in srgb, white 12%, ${s.cardBackground})`);
            }

            renderButtons();

            if (enableInstantBooking && hideRequestOption) {
              titleEl.textContent = T.titleBook;
            } else if (enableInstantBooking) {
              titleEl.textContent = T.titleDefault;
            } else {
              titleEl.textContent = T.titleRequest;
            }
          } catch (e) {
            console.error('Mini widget settings error:', e);
            renderButtons();
          }
        }

        function postHeight() {
          if (window.parent === window) return;
          const h = document.body.scrollHeight + 8;
          window.parent.postMessage({ type: 'mini-widget-height', height: h }, '*');
        }

        updateAdultsUI();
        renderButtons();
        loadSettings().then(() => {
          postHeight();
          new ResizeObserver(postHeight).observe(document.body);
        });
      })();
    </script>
  </body>
</html>
